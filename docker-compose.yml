services:
  db:
    image: postgres:15-alpine
    container_name: sati_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sati_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-sati_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/00_sati_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sati_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: sati_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data_logs:/app/data_logs
    depends_on:
      - db

volumes:
  postgres_data:
